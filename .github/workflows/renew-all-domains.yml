name: Generate All Domains

on:
  schedule:
    - cron: "0 10,22 * * *"
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-domain-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Create credentials.py
        run: |
          cat > scripts/credentials.py << 'EOF'
          ${{ secrets.CREDENTIALS_PY }}
          EOF

      - name: Get new domains from spam folder
        run: |
          cd scripts
          python3 junk-mail.py

      - name: Get new domains from spam folder
        run: |
          cd scripts
          python3 junk-mail.py >> ../spam.txt

      - name: Remove duplicate and empty lines from spam.txt
        run: |
          tail spam.txt
          awk 'NF && !seen[$0]++' spam.txt > spam.tmp
          mv spam.tmp spam.txt

      - name: Generate all-domains.txt
        run: |
          find . -name "*.txt" \
              -type f \
              ! -name "all-domains.txt" \
              ! -path "./all-domains.txt" \
              ! -path "./scripts/*" \
              -exec cat {} + \
            | sed 's/\r//g' | awk '!a[$0]++' > all-domains.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet all-domains.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add all-domains.txt spam.txt
          git commit -m "Auto-update domain list"

          git push
